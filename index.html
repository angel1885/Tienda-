<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Versión Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul-cielo: #87CEEB; --azul-oscuro: #1e3a8a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        
        /* Estilos del Modal del Carrito */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 300; backdrop-filter: blur(8px); transition: all 0.3s; }
        .modal.active { display: flex; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; max-height: 92vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        
        .input-premium { width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; rounded: 1.2rem; padding: 1rem; font-weight: 700; font-size: 0.875rem; outline: none; transition: 0.2s; border-radius: 1rem; }
        .input-premium:focus { border-color: var(--azul-cielo); background: white; }
        
        .btn-cielo { background-color: var(--azul-cielo); color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.3s; }
        .btn-cielo:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        
        .category-btn { transition: 0.2s; border: 2px solid #f1f5f9; font-weight: 800; font-size: 10px; text-transform: uppercase; border-radius: 0.8rem; color: #64748b; }
        .category-btn.active { background-color: var(--azul-cielo); color: white; border-color: var(--azul-cielo); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white sticky top-0 z-50 border-b border-slate-100 px-6 pt-4 pb-2">
        <div class="max-w-xl mx-auto flex justify-between items-center mb-4">
            <button class="bg-slate-50 p-3 rounded-2xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16" /></svg></button>
            <div class="text-center">
                <h1 class="text-xl font-800 text-blue-900 uppercase tracking-tighter">Stock<span style="color: var(--azul-cielo)">Dental</span></h1>
                <p class="text-[7px] tracking-[0.15em] text-slate-400 font-bold uppercase italic">Insumos y Materiales Odontológicos</p>
            </div>
            <button onclick="toggleModal('cart-modal')" class="relative p-3 rounded-2xl text-white shadow-lg shadow-blue-100" style="background-color: var(--azul-cielo)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>

        <div class="max-w-xl mx-auto mb-4 px-4 py-2 rounded-xl flex items-center gap-3 border border-white/20" style="background-color: var(--azul-cielo)">
            <p class="text-[9px] text-white font-bold leading-tight uppercase">
                Pedidos hasta 12:00 PM: <span class="underline">Entrega tarde</span> | Después: <span class="underline">Entrega mañana</span>
            </p>
        </div>

        <div class="max-w-xl mx-auto mb-4 relative">
            <input type="text" id="search-input" oninput="render()" placeholder="Buscar material..." class="w-full bg-slate-50 rounded-2xl p-4 pl-12 font-bold text-sm outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-4 top-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>
    </header>

    <main id="catalog" class="max-w-xl mx-auto p-6 grid grid-cols-2 gap-4 pb-32"></main>

    <div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content no-scrollbar">
            <div class="flex items-center justify-between mb-8">
                <button onclick="toggleModal('cart-modal')" class="bg-slate-100 text-slate-500 text-[10px] font-black px-4 py-2.5 rounded-xl uppercase tracking-wider hover:bg-slate-200 transition-all">← Volver</button>
                <h2 class="text-lg font-900 text-blue-900 italic uppercase">Tu Pedido</h2>
                <div class="w-12"></div> </div>
            
            <div class="space-y-4 mb-8">
                <input type="text" id="cust-name" oninput="validateForm()" class="input-premium" placeholder="Nombre completo">
                <input type="text" id="cust-address" oninput="validateForm()" class="input-premium" placeholder="Dirección o Clínica">
                
                <select id="delivery-zone" onchange="updateCartList(); validateForm()" class="input-premium">
                    <option value="none">Seleccionar Zona (Tasa BCV)</option>
                    <option value="3">Maracay (+3$)</option>
                    <option value="4">Turmero (+4$)</option>
                    <option value="5">Cagua (+5$)</option>
                    <option value="0">Cobro Destino</option>
                </select>

                <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100 shadow-inner">
                    <p class="text-[10px] text-blue-900 font-900 text-center mb-4 uppercase tracking-widest italic">Datos de Pago Móvil</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" id="pay-bank" oninput="validateForm()" placeholder="Banco" class="bg-white p-3 rounded-xl text-xs font-bold border border-blue-100 outline-none focus:ring-2 ring-blue-200">
                        <input type="text" id="pay-ref" oninput="validateForm()" placeholder="Ref (4 dig)" class="bg-white p-3 rounded-xl text-xs font-bold border border-blue-100 outline-none focus:ring-2 ring-blue-200">
                    </div>
                    <input type="number" id="pay-amount" oninput="validateForm()" placeholder="Monto total transferido en Bs." class="w-full bg-white p-4 rounded-xl text-sm font-black border border-blue-100 outline-none focus:ring-2 ring-blue-200">
                    <p class="text-[8px] text-blue-400 font-bold mt-3 text-center uppercase tracking-tight">V-17888104 | 0424-339.1197</p>
                </div>
            </div>

            <div id="cart-list" class="space-y-3 mb-6 max-h-48 overflow-y-auto pr-2"></div>

            <div class="bg-slate-50 rounded-2xl p-6 mb-8 border border-slate-100">
                <div class="flex justify-between items-end">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Final</span>
                        <span class="text-[8px] text-blue-400 font-bold italic mt-1">* Delivery calculado a tasa oficial BCV</span>
                    </div>
                    <div class="text-right">
                        <span id="modal-total" class="text-3xl font-900 text-blue-900 tracking-tighter">0,00 Bs.</span>
                    </div>
                </div>
            </div>

            <button id="btn-send" disabled onclick="sendWhatsApp()" class="btn-cielo w-full py-5 rounded-2xl shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                <span class="text-sm">ENVIAR PEDIDO POR WHATSAPP</span>
            </button>
        </div>
    </div>

    <script>
        const tasaActual = 65.00; // Tasa interna (productos)
        const tasaBCV = 45.00;    // Tasa oficial (delivery)
        const margen = 0.20;

        const productos = [
            { id: 1, name: "Yeso WhipMix T4", costoUSDT: 11, img: "img/yeso-t4.jpg.jpeg", cat: "Técnicos", ficha: "Resistencia extrema." },
            { id: 2, name: "Guantes de Nitrilo", costoUSDT: 10, img: "img/guantes.jpg.jpeg", cat: "Odontólogo", ficha: "Caja de 100 unidades." },
            { id: 3, name: "Acrílico Líquido", costoUSDT: 8, img: "img/acrilico.jpg.jpeg", cat: "Técnicos", ficha: "Transparencia total." }
        ];

        let cart = {}; let currentCat = 'Todos';
        function calcularPrecio(c) { return (c / (1 - margen)) * tasaActual; }

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            productos.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                container.innerHTML += `
                <div class="product-card p-4 flex flex-col">
                    <img src="${p.img}" class="h-28 w-full object-contain mb-3" onerror="this.src='https://placehold.co/200x200/e2e8f0/64748b?text=FOTO'">
                    <h3 class="text-[10px] font-bold text-slate-700 leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center bg-slate-100 rounded-lg p-1">
                            <button onclick="updateQty(${p.id}, -1)" class="w-5 h-5 text-blue-500 font-bold">-</button>
                            <span class="w-6 text-center text-[10px] font-black">${qty}</span>
                            <button onclick="updateQty(${p.id}, 1)" class="w-5 h-5 text-blue-500 font-bold">+</button>
                        </div>
                        <span class="text-[10px] font-black text-blue-500">${calcularPrecio(p.costoUSDT).toLocaleString('es-VE')} Bs</span>
                    </div>
                    <button class="w-full bg-blue-50 text-blue-400 py-2 rounded-xl text-[8px] font-black uppercase">Ficha Técnica</button>
                </div>`;
            });
        }

        function updateCartList() {
            const list = document.getElementById('cart-list');
            const zone = document.getElementById('delivery-zone');
            let totalProds = 0;
            
            list.innerHTML = Object.values(cart).map(i => {
                const sub = calcularPrecio(i.costoUSDT) * i.qty;
                totalProds += sub;
                return `<div class="flex justify-between items-center text-[11px] font-bold text-slate-500 bg-slate-50 p-3 rounded-xl">
                    <span>${i.name} (x${i.qty})</span>
                    <span>${sub.toLocaleString('es-VE')} Bs.</span>
                </div>`;
            }).join('');

            const costoEnvioDolar = (zone.value !== "none") ? parseFloat(zone.value) : 0;
            const totalEnvioBs = costoEnvioDolar * tasaBCV;

            if (costoEnvioDolar > 0) {
                list.innerHTML += `<div class="flex justify-between items-center text-[11px] font-black text-blue-400 p-3 bg-blue-50 rounded-xl italic">
                    <span>Envío ${zone.options[zone.selectedIndex].text.split(' ')[0]} (BCV)</span>
                    <span>${totalEnvioBs.toLocaleString('es-VE')} Bs.</span>
                </div>`;
            }

            document.getElementById('modal-total').innerText = (totalProds + totalEnvioBs).toLocaleString('es-VE') + " Bs.";
        }

        function validateForm() {
            const n = document.getElementById('cust-name').value;
            const d = document.getElementById('cust-address').value;
            const r = document.getElementById('pay-ref').value;
            const a = document.getElementById('pay-amount').value;
            const z = document.getElementById('delivery-zone').value;
            document.getElementById('btn-send').disabled = !(n.length > 2 && d.length > 5 && r.length >= 3 && a > 0 && z !== 'none' && Object.keys(cart).length > 0);
        }

        function updateQty(id, delta) {
            if (!cart[id]) { const p = productos.find(x => x.id === id); cart[id] = { ...p, qty: 0 }; }
            cart[id].qty += delta; if (cart[id].qty <= 0) delete cart[id];
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a, b) => a + b.qty, 0);
            render(); validateForm(); if(document.getElementById('cart-modal').classList.contains('active')) updateCartList();
        }

        function toggleModal(id) { 
            const m = document.getElementById(id); 
            m.classList.toggle('active'); 
            if(m.classList.contains('active')) updateCartList(); 
        }

        function sendWhatsApp() {
            let msg = `🦷 *PEDIDO STOCKDENTAL*%0A👤 *Cliente:* ${document.getElementById('cust-name').value}%0A💰 *Pago:* ${document.getElementById('pay-amount').value} Bs. (Ref: ${document.getElementById('pay-ref').value})%0A%0A`;
            Object.values(cart).forEach(i => msg += `• ${i.name} (x${i.qty})%0A`);
            msg += `%0A*TOTAL:* ${document.getElementById('modal-total').innerText}`;
            window.open(`https://wa.me/584243391197?text=${msg}`);
        }
        render();
    </script>
</body>
</html>
