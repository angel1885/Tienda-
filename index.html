<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Farmacia Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .product-card { 
            background: white; 
            border-radius: 1rem; 
            overflow: hidden; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .category-pill {
            transition: all 0.3s;
            border: 1px solid #e5e7eb;
        }
        .category-pill.active {
            background-color: #0046ad;
            color: white;
            border-color: #0046ad;
        }
        .blue-brand { color: #0046ad; }
        .bg-brand { background-color: #0046ad; }
    </style>
</head>
<body>

    <!-- Header Estilo Farmatodo -->
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center text-white font-bold italic">S</div>
                <h1 class="text-xl font-bold tracking-tight blue-brand text-blue-800">STOCK<span class="text-slate-500">DENTAL</span></h1>
            </div>
            <button onclick="toggleCart()" class="relative p-2 text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </header>

    <!-- Buscador y Filtros -->
    <section class="max-w-6xl mx-auto p-4">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-slate-800">¿Qué buscas hoy?</h2>
            <p class="text-slate-500 text-sm">Suministros dentales en Maracay</p>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="filter('todos')" class="category-pill active px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Todos</button>
            <button onclick="filter('odontologo')" class="category-pill bg-white px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Odontólogos</button>
            <button onclick="filter('tecnico')" class="category-pill bg-white px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Técnicos</button>
            <button onclick="filter('estudiante')" class="category-pill bg-white px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Estudiantes</button>
        </div>
    </section>

    <!-- Catálogo en Cuadrícula -->
    <main id="catalog" class="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-32">
        <!-- Los productos se cargan aquí -->
    </main>

    <!-- Barra de Pago Inferior -->
    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg transform translate-y-full transition-transform duration-300 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Subtotal</p>
                <p id="total-price" class="text-xl font-bold blue-brand text-blue-800">0,00 Bs.</p>
            </div>
            <button onclick="sendWhatsApp()" class="bg-blue-700 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 shadow-md transition-all">
                PEDIR POR WHATSAPP
            </button>
        </div>
    </div>

    <script>
       const productos = [
            { 
                id: 1, 
                name: "Yeso Whip Mix T4", 
                price: 6599, 
                cat: "tecnico", 
                img: "https://http2.mlstatic.com/D_NQ_NP_960527-MLV46340536417_062021-O.webp",
                desc: "1 Kg de yeso extraduro para troqueles." 
            },
            { 
                id: 2, 
                name: "Guantes de Nitrilo Ecomed", 
                price: 5628, 
                cat: "odontologo", 
                img: "https://m.media-amazon.com/images/I/71Y-BfW5bXL._AC_SL1500_.jpg",
                desc: "Caja de 100u. Alta resistencia y tacto." 
            },
            { 
                id: 3, 
                name: "Cera Base Bon Dent", 
                price: 7198, 
                cat: "tecnico", 
                img: "https://pro-dentalsupplies.com/cdn/shop/products/baseplatewax_1024x1024.jpg?v=1548881260",
                desc: "Cera rosa para modelado de prótesis." 
            },
            { 
                id: 4, 
                name: "Yeso Blanco Tipo II", 
                price: 1800, 
                cat: "estudiante", 
                img: "https://acdn.mitiendanube.com/stores/002/097/349/products/yeso-pariss-blanco1-e51c89076f827038e916510842851608-640-0.webp",
                desc: "Bolsa de 1kg para modelos de estudio." 
            },
            { 
                id: 5, 
                name: "Acrílico Polímero/Líquido", 
                price: 3666, 
                cat: "tecnico", 
                img: "https://http2.mlstatic.com/D_NQ_NP_600612-MLV44636906560_012021-O.jpg",
                desc: "Acrílico dental de autocurado." 
            }
        ];
            }
        ];

        let cart = [];
        let total = 0;

        function render(filterCat = 'todos') {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            const filtered = filterCat === 'todos' ? productos : productos.filter(p => p.cat === filterCat);
            
            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full h-32 object-cover" alt="${p.name}">
                        <div class="p-3">
                            <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${p.cat}</span>
                            <h3 class="text-sm font-bold text-slate-800 mt-1 h-10 overflow-hidden leading-tight">${p.name}</h3>
                            <p class="text-xs text-slate-400 mt-1">${p.desc}</p>
                            <div class="mt-4 flex flex-col gap-2">
                                <span class="text-lg font-bold text-slate-900">${p.price.toLocaleString('es-VE')} <small class="text-xs">Bs.</small></span>
                                <button onclick="addToCart('${p.name}', ${p.price})" class="w-full bg-slate-100 text-blue-800 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 hover:text-white transition-colors">
                                    AGREGAR
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateUI();
            document.getElementById('checkout-bar').classList.remove('translate-y-full');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = total.toLocaleString('es-VE') + " Bs.";
        }

        function filter(cat) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(cat);
        }

        function sendWhatsApp() {
            let message = "🦷 *PEDIDO STOCKDENTAL*%0A---------------------------%0A";
            cart.forEach(item => message += `• ${item.name} - ${item.price} Bs.%0A`);
            message += `---------------------------%0A*TOTAL: ${total.toLocaleString('es-VE')} Bs.*`;
            window.open(`https://wa.me/584243391197?text=${message}`);
        }

        render();
    </script>
</body>
</html>
