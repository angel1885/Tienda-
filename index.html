<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Catálogo Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; max-height: 90vh; overflow-y: auto; }
        .tech-sheet { background: #f1f5f9; border-left: 4px solid #3b82f6; padding: 1rem; border-radius: 0.75rem; margin-top: 1rem; font-size: 0.85rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold text-blue-900 tracking-tighter uppercase leading-none">Stock<span class="text-blue-500">Dental</span></h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mt-1">Precios a Tasa BCV</p>
            </div>
            <button onclick="toggleModal('cart-modal')" class="relative p-3 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-4 border-white">0</span>
            </button>
        </div>
    </header>

    <!-- Catálogo -->
    <main id="catalog" class="max-w-xl mx-auto p-4 flex flex-col gap-8 pb-40">
        <!-- Generado dinámicamente -->
    </main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-blue-900">Tu Pedido</h2>
                <button onclick="toggleModal('cart-modal')" class="bg-slate-100 text-slate-500 p-2 rounded-full font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <div id="cart-list" class="flex flex-col gap-4 mb-8"></div>

            <!-- Datos Bancarios Corregidos -->
            <div class="bg-blue-50 rounded-[1.5rem] p-6 mb-8 border border-blue-100">
                <h3 class="text-xs font-black text-blue-900 uppercase mb-4 tracking-widest flex items-center">
                    <span class="bg-blue-600 w-2 h-2 rounded-full mr-2"></span> Información de Pago
                </h3>
                <div class="space-y-4 text-sm text-blue-900">
                    <div>
                        <p class="font-bold text-[10px] text-blue-400 uppercase tracking-tighter">Pago Móvil Principal</p>
                        <p class="font-bold tracking-tight text-md">Venezuela (0102) | 17.888.104</p>
                        <p class="font-black text-lg text-blue-700">0424-339.1197</p>
                    </div>
                    <div class="pt-2 border-t border-blue-100 italic">
                        <p class="text-xs">También disponible: Mercantil (0105)</p>
                    </div>
                    <div class="pt-2 border-t border-blue-100">
                        <p class="font-bold text-[10px] text-blue-400 uppercase tracking-tighter">Digital / Binance</p>
                        <p class="font-bold break-all">laboratoriomolimed@gmail.com</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-8 px-2">
                <span class="font-bold text-slate-400 uppercase text-xs tracking-widest">Total Estimado (BCV)</span>
                <span id="modal-total" class="text-3xl font-black text-blue-900">0 Bs.</span>
            </div>

            <button onclick="sendWhatsApp()" class="w-full bg-blue-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl shadow-blue-200 active:scale-95 transition-transform uppercase tracking-wider">Confirmar y Enviar Comprobante</button>
        </div>
    </div>

    <script>
        // Los precios aquí ya reflejan tu cálculo interno de margen (Binance -> BCV)
        const productos = [
            { id: 1, name: "Yeso WhipMix T4", price: 6599, img: "yesowitmix.jpeg", desc: "Yeso extraduro Silky-Rock para troqueles de precisión.", tech: {"Tipo": "IV", "Fraguado": "10-13 min", "Expansión": "0.09%"} },
            { id: 2, name: "Guantes de Nitrilo", price: 5628, img: "gauntes de nitrilo.jpeg", desc: "Caja de 100u. Libres de látex, alta sensibilidad.", tech: {"Material": "Nitrilo", "Talla": "M", "Color": "Azul"} },
            { id: 3, name: "Acrílico Líquido 120ml", price: 3666, img: "acrilico liquido termo.jpeg", desc: "Pribanic Lucident de alta transparencia.", tech: {"Marca": "Pribanic", "Uso": "Termocurable", "Volumen": "120ml"} },
            { id: 4, name: "Cera Base Bon Dent", price: 7198, img: "descarga.jpeg", desc: "Cera para bases de dentaduras en climas tropicales.", tech: {"Punto fusión": "62°C", "Uso": "Laboratorio"} }
        ];

        let cart = {};

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            productos.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full h-64 object-cover" onerror="this.src='https://placehold.co/400x300?text=StockDental'">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-black text-blue-900 leading-tight">${p.name}</h3>
                                <button onclick="toggleTech(${p.id})" class="text-[9px] bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-black uppercase tracking-widest">Info</button>
                            </div>
                            <p class="text-sm text-slate-400 mb-6">${p.desc}</p>
                            <div id="tech-${p.id}" class="tech-sheet hidden mb-6 italic border-blue-400 bg-blue-50 text-blue-700">
                                ${Object.entries(p.tech).map(([k, v]) => `<div><strong>${k}:</strong> ${v}</div>`).join('')}
                            </div>
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="text-2xl font-black text-blue-600 leading-none">${p.price.toLocaleString('es-VE')} Bs.</span>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Tasa Oficial BCV</p>
                                </div>
                                <div class="flex items-center bg-slate-100 rounded-2xl p-1.5 shadow-inner border border-slate-200">
                                    <button onclick="updateQty(${p.id}, -1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm text-blue-600 font-black text-xl hover:bg-red-50">-</button>
                                    <span class="w-10 text-center font-black text-blue-900 text-lg">${qty}</span>
                                    <button onclick="updateQty(${p.id}, 1)" class="w-10 h-10 flex items-center justify-center bg-blue-600 rounded-xl shadow-lg text-white font-black text-xl">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateQty(id, delta) {
            const product = productos.find(p => p.id === id);
            if (!cart[id]) cart[id] = { ...product, qty: 0 };
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateHeader();
            render();
        }

        function updateHeader() {
            const count = Object.values(cart).reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function toggleTech(id) {
            document.getElementById(`tech-${id}`).classList.toggle('hidden');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('active');
            if(m.classList.contains('active')) updateCartList();
        }

        function updateCartList() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = Object.keys(cart).length === 0 ? "<p class='text-center text-slate-400 py-10 font-bold'>Carrito vacío</p>" : "";
            Object.values(cart).forEach(item => {
                const sub = item.price * item.qty;
                total += sub;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-5 rounded-2xl border border-slate-100">
                        <div><p class="font-black text-blue-900">${item.name}</p><p class="text-xs font-bold text-blue-500">${item.qty} unidad(es) × ${item.price.toLocaleString('es-VE')} Bs.</p></div>
                        <p class="font-black text-blue-900 text-sm">${sub.toLocaleString('es-VE')} Bs.</p>
                    </div>
                `;
            });
            document.getElementById('modal-total').innerText = total.toLocaleString('es-VE') + " Bs.";
        }

        function sendWhatsApp() {
            const items = Object.values(cart);
            if(items.length === 0) return alert("Selecciona productos");
            let total = 0;
            let msg = "🦷 *NUEVO PEDIDO - STOCKDENTAL*%0A_Precios ajustados a BCV_%0A%0A";
            items.forEach(i => {
                const s = i.price * i.qty;
                total += s;
                msg += `• *${i.name}* (x${i.qty})%0A   Subtotal: ${s.toLocaleString('es-VE')} Bs.%0A`;
            });
            msg += `%0A💰 *TOTAL A PAGAR: ${total.toLocaleString('es-VE')} Bs.*%0A%0A📌 _Información de pago adjunta en catálogo._`;
            window.open(`https://wa.me/584243391197?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
