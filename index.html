<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Insumos Odontológicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul-cielo: #87CEEB; --azul-oscuro: #1e3a8a; --verde-whatsapp: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .product-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 500; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 400; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 300; backdrop-filter: blur(8px); }
        .modal.active { display: flex; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; max-height: 92vh; overflow-y: auto; }
        .category-btn.active { background-color: var(--azul-cielo); color: white; border-color: var(--azul-cielo); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="zoom-modal" class="modal" onclick="if(event.target == this) toggleModal('zoom-modal')">
        <div class="modal-content !rounded-t-[3rem] text-center">
            <div class="flex justify-between items-center mb-4">
                <div class="w-10"></div><div class="h-1.5 w-12 bg-slate-200 rounded-full"></div>
                <button onclick="toggleModal('zoom-modal')" class="bg-slate-100 p-2 rounded-full text-slate-400">✕</button>
            </div>
            <img id="zoom-img" src="" alt="Zoom" class="shadow-2xl mb-4 border-4 border-white max-h-[35vh] mx-auto rounded-2xl">
            <h2 id="zoom-name" class="text-xl font-900 text-blue-900 uppercase italic mb-1 leading-tight"></h2>
            <div class="flex flex-col items-center gap-3 mb-6">
                <span id="zoom-price" class="text-xl font-black text-blue-500 bg-blue-50 px-4 py-1 rounded-full"></span>
                <div id="zoom-controls" class="flex items-center bg-slate-100 rounded-2xl p-2 gap-6 scale-110">
                    <button id="zoom-minus" class="w-10 h-10 bg-white rounded-xl text-blue-500 font-black shadow-sm text-xl">-</button>
                    <span id="zoom-qty" class="w-8 text-center text-lg font-black text-blue-900">0</span>
                    <button id="zoom-plus" class="w-10 h-10 bg-white rounded-xl text-blue-500 font-black shadow-sm text-xl">+</button>
                </div>
            </div>
            <p id="zoom-ficha" class="text-sm text-slate-500 font-medium leading-relaxed bg-slate-50 p-5 rounded-3xl mb-8 border border-slate-100"></p>
        </div>
    </div>

    <div id="sidebar" class="sidebar flex flex-col">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h2 class="text-blue-900 font-900 text-xl uppercase tracking-tighter">Stock<span style="color: var(--azul-cielo)">Dental</span></h2>
                <p class="text-[8px] text-slate-400 font-bold uppercase italic">Menú Principal</p>
            </div>
            <button onclick="toggleMenu()" class="text-slate-300">✕</button>
        </div>
        <nav class="p-6 space-y-2">
            <button class="w-full text-left p-4 rounded-2xl hover:bg-slate-50 text-blue-900 font-800 text-sm">Inicio</button>
            <button class="w-full text-left p-4 rounded-2xl hover:bg-slate-50 text-blue-900 font-800 text-sm">Catálogo</button>
            <button class="w-full text-left p-4 rounded-2xl hover:bg-slate-50 text-blue-900 font-800 text-sm">¿Quiénes somos?</button>
            <button class="w-full text-left p-4 rounded-2xl hover:bg-slate-50 text-blue-900 font-800 text-sm">Contacto</button>
        </nav>
        <div class="mt-auto p-8 border-t border-slate-100 text-center">
            <p class="text-[9px] text-slate-400 font-black uppercase mb-2">Aliado Comercial</p>
            <p class="text-[10px] text-blue-900 font-900 uppercase">Laboratorio Dental Especializado</p>
            <p class="text-[11px] text-slate-400 font-bold uppercase mb-4">Ángel Molina</p>
            <button onclick="window.open('https://wa.me/584243391197')" class="w-full bg-blue-900 text-white py-4 rounded-xl font-black text-[9px] uppercase">SOLICITAR SERVICIOS</button>
        </div>
    </div>

    <header class="bg-white sticky top-0 z-50 border-b border-slate-100 px-6 pt-4 pb-2">
        <div class="max-w-xl mx-auto flex justify-between items-center mb-4">
            <button onclick="toggleMenu()" class="bg-slate-50 p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
            <div class="text-center">
                <h1 class="text-xl font-800 text-blue-900 uppercase tracking-tighter">Stock<span style="color: var(--azul-cielo)">Dental</span></h1>
                <p class="text-[7px] tracking-[0.15em] text-slate-400 font-bold uppercase italic">Insumos y Materiales</p>
            </div>
            <button onclick="toggleModal('cart-modal')" class="relative p-3 rounded-2xl text-white shadow-lg" style="background-color: var(--azul-cielo)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>

        <div class="max-w-xl mx-auto mb-3 relative">
            <input type="text" id="search-input" oninput="render()" placeholder="Buscar material..." class="w-full bg-slate-50 rounded-2xl p-4 pl-12 font-bold text-sm outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-4 top-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>

        <div class="max-w-xl mx-auto flex gap-2 overflow-x-auto pb-2 no-scrollbar px-1">
            <button onclick="setCategory('todos')" id="cat-todos" class="category-btn active border-2 border-slate-100 rounded-full px-5 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all">Todos</button>
            <button onclick="setCategory('odontologo')" id="cat-odontologo" class="category-btn border-2 border-slate-100 rounded-full px-5 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all">Odontólogos</button>
            <button onclick="setCategory('estudiante')" id="cat-estudiante" class="category-btn border-2 border-slate-100 rounded-full px-5 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all">Estudiantes</button>
            <button onclick="setCategory('tecnico')" id="cat-tecnico" class="category-btn border-2 border-slate-100 rounded-full px-5 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all">Técnico Dental</button>
        </div>
    </header>

    <main id="catalog" class="max-w-xl mx-auto p-6 grid grid-cols-2 gap-4 pb-32"></main>

    <div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-8">
                <button onclick="toggleModal
