<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Suministros Especializados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .product-card { background: white; border-radius: 1rem; border: 1px solid #e5e7eb; transition: all 0.3s; }
        .product-card:hover { border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .qty-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; transition: active 0.1s; }
        .qty-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">S</div>
                <div>
                    <h1 class="text-xl font-black text-blue-900 leading-none tracking-tight">STOCKDENTAL</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">Suministros Especializados</p>
                </div>
            </div>
            <div class="bg-blue-50 p-2 rounded-full relative border border-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-6xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 py-8 pb-40">
        <!-- Los productos se cargan aquí -->
    </main>

    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-2xl transform translate-y-full transition-transform duration-500 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Total Estimado</p>
                <p id="total-price" class="text-3xl font-black text-blue-900 leading-tight">0,00 Bs.</p>
            </div>
            <button onclick="sendWhatsApp()" class="w-full md:w-auto bg-blue-600 text-white px-12 py-4 rounded-2xl font-black text-sm tracking-widest hover:bg-blue-700 shadow-xl transition-all">
                PEDIR POR WHATSAPP
            </button>
        </div>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Yeso Whip Mix T4", price: 6599, img: "https://images.unsplash.com/photo-1583947581924-860bda6a26df?w=400", desc: "1 Kg extraduro para troqueles." },
            { id: 2, name: "Guantes de Nitrilo Ecomed", price: 5628, img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400", desc: "Caja 100u. Sin látex." },
            { id: 3, name: "Cera Base Bon Dent", price: 7198, img: "https://images.unsplash.com/photo-1606811971618-4486d14f3f99?w=400", desc: "Modelado de prótesis rosa." },
            { id: 4, name: "Yeso Blanco Tipo II", price: 1800, img: "https://images.unsplash.com/photo-1576086213369-97a306d36557?w=400", desc: "Modelo de estudio 1kg." },
            { id: 5, name: "Acrílico Polímero/Líquido", price: 3666, img: "https://images.unsplash.com/photo-1612117561461-12cd278913b7?w=400", desc: "Autocurado alta densidad." }
        ];

        let cart = {};

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            productos.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                container.innerHTML += `
                    <div class="product-card p-6 flex flex-col">
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-lg mb-4" alt="${p.name}">
                        <h3 class="text-lg font-bold text-slate-800 leading-tight mb-2 h-12">${p.name}</h3>
                        <p class="text-xs text-slate-400 mb-6">${p.desc}</p>
                        <div class="mt-auto flex items-center justify-between">
                            <span class="text-xl font-black text-slate-900">${p.price.toLocaleString('es-VE')} <small class="text-[10px]">Bs.</small></span>
                            <div class="flex items-center gap-3 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                <button onclick="updateQty(${p.id}, -1)" class="qty-btn bg-white text-blue-700 shadow-sm">-</button>
                                <span id="qty-${p.id}" class="text-sm font-black w-4 text-center text-blue-900">${qty}</span>
                                <button onclick="updateQty(${p.id}, 1)" class="qty-btn bg-blue-700 text-white shadow-md">+</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, delta) {
            const p = productos.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += delta;
            if (cart[id].qty < 0) cart[id].qty = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id].qty;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0; let count = 0;
            for (let id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }
            document.getElementById('total-price').innerText = total.toLocaleString('es-VE') + " Bs.";
            document.getElementById('cart-count').innerText = count;
            const bar = document.getElementById('checkout-bar');
            total > 0 ? bar.classList.remove('translate-y-full') : bar.classList.add('translate-y-full');
        }

        function sendWhatsApp() {
            let message = "🦷 *PEDIDO STOCKDENTAL - MARACAY*%0A---------------------------%0A";
            let total = 0;
            for (let id in cart) {
                if(cart[id].qty > 0) {
                    const sub = cart[id].price * cart[id].qty;
                    message += `• ${cart[id].qty}x ${cart[id].name} (${sub.toLocaleString('es-VE')} Bs.)%0A`;
                    total += sub;
                }
            }
            message += `---------------------------%0A*TOTAL: ${total.toLocaleString('es-VE')} Bs.*`;
            window.open(`https://wa.me/584243391197?text=${message}`);
        }
        render();
    </script>
</body>
</html>
